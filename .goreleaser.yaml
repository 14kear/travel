version: 2

project_name: trvl

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...

builds:
  - id: trvl
    main: ./cmd/trvl
    binary: trvl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: trvl
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: MikkoParkkola
    name: trvl
  prerelease: auto
  draft: false
  name_template: "v{{ .Version }}"
  header: |
    ## trvl {{ .Version }}

    Google Flights + Hotels from your terminal. Free, no API keys.

    ### Install

    ```bash
    # One-liner
    curl -fsSL https://github.com/MikkoParkkola/trvl/releases/download/v{{ .Version }}/trvl_{{ .Version }}_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz | tar xz -C /usr/local/bin trvl

    # Homebrew
    brew install MikkoParkkola/tap/trvl

    # Go
    go install github.com/MikkoParkkola/trvl/cmd/trvl@v{{ .Version }}
    ```

# brews: section removed.
#
# goreleaser-action runs with the default GITHUB_TOKEN, which can only push to
# the current repo (MikkoParkkola/trvl). Pushing the auto-generated formula to
# MikkoParkkola/homebrew-tap requires a personal access token with cross-repo
# write scope, configured as a workflow secret. Until that PAT is added, the
# trvl Homebrew formula is maintained by hand in homebrew-tap/Formula/trvl.rb
# and bumped after each release.

dockers:
  - image_templates:
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=trvl"
      - "--label=org.opencontainers.image.description=Google Flights + Hotels from your terminal"
      - "--label=org.opencontainers.image.url=https://github.com/MikkoParkkola/trvl"
      - "--label=org.opencontainers.image.source=https://github.com/MikkoParkkola/trvl"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - image_templates:
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=trvl"
      - "--label=org.opencontainers.image.description=Google Flights + Hotels from your terminal"
      - "--label=org.opencontainers.image.url=https://github.com/MikkoParkkola/trvl"
      - "--label=org.opencontainers.image.source=https://github.com/MikkoParkkola/trvl"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/mikkoparkkola/trvl:{{ .Version }}"
    image_templates:
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-amd64"
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-arm64"
  - name_template: "ghcr.io/mikkoparkkola/trvl:latest"
    image_templates:
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-amd64"
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-arm64"

version: 2

project_name: trvl

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...

builds:
  - id: trvl
    main: ./cmd/trvl
    binary: trvl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: trvl
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: MikkoParkkola
    name: trvl
  prerelease: auto
  draft: false
  name_template: "v{{ .Version }}"
